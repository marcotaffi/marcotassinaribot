name: formatta_ai
description: "Formatta l'articolo centrale per sito Apg23"
prompt: >
  Applica al testo dell'articolo le trasformazioni seguenti, per formattarlo in html.

  IMPORTANTE

  - Non modificare il contenuto.
  - Non riassumere.
  - Non aggiungere parole. 
  - Non inventare sezioni.  
  - Non cambiare l’ordine.  
  - Non riformulare.
  - Non cambiare l’ordine dei contenuti.
  - Limita al massimo la creatività: applica solo trasformazioni meccaniche.

  REGOLE DI TRASFORMAZIONE

    Il testo è in formato Markdown e deve essere convertito in HTML:

    Ogni sezione dell’articolo deve essere trasformata in un blocco HTML separato, **iniziando con <DIV> e finendo con </DIV>**.  

    Struttura base:

    <div class="BlockWrapperContainer  Block-titolo-paragrafo-pulsante" style="background-color:#FFFFFF; margin-top:; margin-bottom:2%; height:">
    <div class="BlockMainContainer SiteWidth">
    <div class="BlockWrapper BlockTitoloParagrafoPulsante SiteWidth">

    <div class="PageTitleSmall">Titolo della sezione</div>

    <div class="BodyText">
    <p>Paragrafo 1</p>
    <p>Paragrafo 2</p>
    </div>

    </div>
    </div>
    </div>


    REGOLE DI CONVERSIONE MARKDOWN → HTML
    
    TITOLI DI SEZIONE
    ## Titolo sezione

    diventa:

    <div class="PageTitleSmall">Titolo sezione</div>

    Il testo che segue il titolo diventa il contenuto del blocco:

    <div class="BodyText">
    <p>paragrafo</p>
    </div>


    FORMATTAZIONE DEL TESTO
    - Testo normale → diviso in paragrafi <P>  
    - Nomi e cognomi di persona, e nomi di province → <strong>Nome Cognome</strong>  
    - Frasi più importanti → <strong>frase</strong>  
    - Titoli intermedi → <H2> o <H3>  
    - Nomi di associazioni e enti → <i>Nome Associazione/Ente</i>  
    - Nomi di eventi o progetti → <em>&quot;Nome Evento/Progetto&quot;</em>  
    - Dichiarazioni e interviste → &laquo;testo&raquo;  
    - Elenchi puntati → <UL><LI>…</LI></UL>  
    - Elenchi numerati → <OL><LI>…</LI></OL>  
    - URL dei link → Questa è una <A target="_blank" href="URL completo">Campagna</A>  


    STRUTTURA DELL’ARTICOLO
    Per ogni sezione markdown:
    ## Titolo
    paragrafo
    paragrafo

    → generare un blocco HTML completo come sopra, rispettando tutte le regole di formattazione.

    FONTE
    Se presente, alla fine dell’articolo inserire il link alla fonte originale:

    <div class="MainButtonBlockContainer PulsanteLeft">
    <a class="MainButton MainButtonDark" href="LINK_ARTICOLO_ORIGINALE" target="_blank">Leggi l’articolo originale su semprenews.it<i class="fa-solid fa-arrow-right"></i></a>
    </div>

  OUTPUT
  Restituisci esclusivamente il testo finale completo con le trasformazioni applicate.
 

