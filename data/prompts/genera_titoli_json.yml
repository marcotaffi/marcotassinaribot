name: genera_titoli_json
params:
 type:
    - title
    - excerpt
    - eventDate
    - eventPlace
    - yoast_title
    - yoast_metadesc
prompt: >
  Genera i titoli per il testo dato in formato JSON, fornendo i campi necessari per la pubblicazione online. 
  
  # Indicazioni redazionali
  - Se presenti, includi call to action, inviti a eventi o date principali nel sottotitolo.
  - Rispetta la lunghezza massima di 100 caratteri per yoast_metadesc.
  - Mantieni fedeltà ai fatti: non aggiungere informazioni non presenti nell’articolo.

  # campi SEO
  Individua la parola chiave principale dell’articolo e usala in modo discorsivo in yoast_title (titolo SEO) e Syoast_metadesc (metadata SEO).

  # Formato 
  Scrivi i titoli come testo normale, senza formattazioni.
  Inseriscili in una stringa JSON che deve avere sempre le seguenti chiavi:

  {
    "title": "Breve, formale, introduttivo al contenuto dell'articolo",
    "excerpt": "Brevissimo approfondimento con le 5W della notizia, ad esempio riferendo luogo, data o dichiarazioni",
    "eventDate": "" | "Data evento"
    "eventPlace": "" | "Luogo evento"
    "yoast_title": "Titolo semplificato che inizi con la parola chiave",
    "yoast_metadesc": "Breve testo d'impatto, massimo 100 caratteri, contenente la parola chiave", 
  }

