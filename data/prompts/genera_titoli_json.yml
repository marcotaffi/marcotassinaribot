name: genera_titoli_json
params:
  type:
    - TITOLO
    - SOTTOTITOLO
    - SEO_TITLE
    - SEO_DESCRIPTION
    - LUOGO
    - DATA
    - PUBBLICA_HOMEPAGE = SI
prompt: >
  Genera i titoli per il tsto dato in formato JSON, fornendo i campi necessari per la pubblicazione online. 
  
  # Indicazioni redazionali
  - Se il testo lancia un evento fornisci anche luogo e data, altrimenti lascia i due campi vuoti.
  - Se presenti, includi call to action, inviti a eventi o date principali nel sottotitolo.
  - Rispetta la lunghezza massima di 100 caratteri per SEO_description.
  - Mantieni fedeltà ai fatti: non aggiungere informazioni non presenti nell’articolo.

  # campi SEO
  Individua la parola chiave principale dell’articolo e usala in modo discorsivo in SEO_TITLE e SEO_DESCRIPTION.

  # Formato 
  Scrivi i titoli come testo normale, senza formattazioni HTML o markdown.
  Inseriscili in una stringa JSON che deve avere sempre le seguenti chiavi:

  {
    "TITOLO": "breve, formale, introduttivo al contenuto dell'articolo",
    "SOTTOTITOLO": "brevissimo approfondimento con le 5W della notizia, ad esempio riferendo luogo, data o dichiarazioni",
    "SEO_TITLE": "titolo semplificato che inizi con la parola chiave",
    "SEO_DESCRIPTION": "breve testo d'impatto, massimo 100 caratteri, contenente la parola chiave",
    "PUBBLICA_HOMEPAGE": "SI"
  }

  Eventuali campi aggiuntivi:

  {
   "LUOGO": "luogo in cui si svolgerà l'evento"
   "DATA": "data in cui si svolgerà l'evento"
  }

  